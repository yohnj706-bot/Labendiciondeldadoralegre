<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YonShop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

.container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

/* Cada video */
.video-card {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Info abajo */
.info {
  position: absolute;
  bottom: 20px;
  left: 15px;
}

/* Botones derecha */
.actions {
  position: absolute;
  right: 10px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
  font-size: 18px;
}

/* Botón comprar */
.buy-btn {
  background: red;
  padding: 10px 15px;
  border: none;
  color: white;
  margin-top: 10px;
  font-weight: bold;
  border-radius: 5px;
}

/* Logo arriba */
.logo {
  position: fixed;
  top: 10px;
  left: 15px;
  font-size: 20px;
  font-weight: bold;
  z-index: 10;
}

</style>
</head>

<body>

<div class="logo">🔥 YonShop</div>

<div class="container" id="feed">

  <!-- VIDEO 1 -->
  <div class="video-card">
    <video src="video1.mp4" loop muted></video>

    <div class="info">
      <h3>🔥 Producto viral</h3>
      <p>Lo encontré barato 😳</p>
      <a href="TU_LINK_AFILIADO" target="_blank">
        <button class="buy-btn">Comprar ahora</button>
      </a>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️</button>
      <button onclick="share()">🔗</button>
    </div>
  </div>

  <!-- VIDEO 2 -->
  <div class="video-card">
    <video src="video2.mp4" loop muted></video>

    <div class="info">
      <h3>💰 Oferta loca</h3>
      <p>Vale la pena comprar</p>
      <a href="TU_LINK_AFILIADO" target="_blank">
        <button class="buy-btn">Ver producto</button>
      </a>
    </div>

    <div class="actions">
      <button onclick="like(this)">❤️</button>
      <button onclick="share()">🔗</button>
    </div>
  </div>

</div>

<script>
// AUTO PLAY AL HACER SCROLL
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.7 });

videos.forEach(video => {
  observer.observe(video);
});

// LIKE
function like(btn) {
  btn.innerText = "💖";
}

// COMPARTIR
function share() {
  alert("Comparte esta página 🔥");
}
</script>

</body>
</html>
