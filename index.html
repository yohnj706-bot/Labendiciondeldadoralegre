<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Bendición del Dador Alegre</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #f4f4f4;
    }
    header {
      background: #007BFF;
      color: white;
      padding: 20px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
    }
    .content {
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1 id="title">Fundación La Bendición del Dador Alegre</h1>
  <button onclick="setLanguage('es')">Español</button>
  <button onclick="setLanguage('en')">English</button>
</header>

<div class="content">
  <p id="description">
    Estamos recaudando fondos para ayudar a niños y familias necesitadas en Turbaco, Colombia.
  </p>

  <a href="https://gofund.me/8dffb9803" target="_blank">
    <button id="donateBtn">Donar</button>
  </a>
</div>

<script>
function setLanguage(lang) {
  if (lang === 'es') {
    document.getElementById('title').innerText = "Fundación La Bendición del Dador Alegre";
    document.getElementById('description').innerText = "Estamos recaudando fondos para ayudar a niños y familias necesitadas en Turbaco, Colombia.";
    document.getElementById('donateBtn').innerText = "Donar";
  } else {
    document.getElementById('title').innerText = "The Cheerful Giver's Blessing Foundation";
    document.getElementById('description').innerText = "We are raising funds to help children and families in need in Turbaco, Colombia.";
    document.getElementById('donateBtn').innerText = "Donate";
  }
}
</script>

</body>
</html>
